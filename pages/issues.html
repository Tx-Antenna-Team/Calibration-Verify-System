<div class="page-header">
  <div>
    <div class="page-title" data-i18n="issueTitle">Feedback & Issues</div>
    <div class="page-subtitle" data-i18n="issueSubtitle">รายงานปัญหาหรือข้อเสนอแนะ และติดตามความคืบหน้า</div>
  </div>
  <button class="btn btn-primary" onclick="window.CVS_Issues.openFeedback()">
    <span data-i18n="issueSubmitBtn">+ ส่ง Feedback</span>
  </button>
</div>

<div class="page-body">

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
    <div class="card" style="padding:20px;text-align:center;">
      <div style="font-size:28px;font-weight:700;color:var(--success);" id="stat-open">—</div>
      <div class="text-muted" style="font-size:13px;margin-top:4px;" data-i18n="issueOpenCount">เปิดอยู่</div>
    </div>
    <div class="card" style="padding:20px;text-align:center;">
      <div style="font-size:28px;font-weight:700;color:var(--text-muted);" id="stat-closed">—</div>
      <div class="text-muted" style="font-size:13px;margin-top:4px;" data-i18n="issueClosedCount">ปิดแล้ว</div>
    </div>
    <div class="card" style="padding:20px;text-align:center;">
      <div style="font-size:28px;font-weight:700;color:var(--primary);" id="stat-total">—</div>
      <div class="text-muted" style="font-size:13px;margin-top:4px;" data-i18n="issueAllCount">ทั้งหมด</div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="text-muted" style="font-size:13px;">กรอง:</span>
    <button class="btn btn-ghost btn-sm issue-filter-btn active" data-filter="open"
            onclick="window.CVS_Issues.applyFilter('open')" data-i18n="issueFilterOpen">เปิดอยู่</button>
    <button class="btn btn-ghost btn-sm issue-filter-btn" data-filter="closed"
            onclick="window.CVS_Issues.applyFilter('closed')" data-i18n="issueFilterClosed">ปิดแล้ว</button>
    <button class="btn btn-ghost btn-sm issue-filter-btn" data-filter="all"
            onclick="window.CVS_Issues.applyFilter('all')" data-i18n="issueFilterAll">ทั้งหมด</button>

    <div style="flex:1;"></div>

    <a href="https://github.com/tx-antenna-team/calibration-verify-system/issues"
       target="_blank" rel="noopener" class="btn btn-ghost btn-sm">
      🔗 GitHub Issues
    </a>
  </div>

  <!-- Issues List -->
  <div id="issues-list">
    <div class="text-center text-muted" style="padding:40px;" data-i18n="issueLoading">กำลังโหลด...</div>
  </div>

</div>

<!-- Filter button active style -->
<style>
  .issue-filter-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
</style>

<!-- Modal: Submit Feedback -->
<div class="modal-overlay" id="issues-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" data-i18n="issueFeedbackTitle">ส่ง Feedback / รายงานปัญหา</span>
      <button class="modal-close" onclick="window.CVS_Issues.closeFeedback()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label class="form-label" data-i18n="issueCategoryLabel">ประเภท</label>
        <select id="fb-category" class="form-control">
          <option value="bug" data-i18n="issueCatBug">🐛 รายงานข้อผิดพลาด (Bug)</option>
          <option value="feature" data-i18n="issueCatFeature">✨ ขอฟีเจอร์ใหม่ (Feature Request)</option>
          <option value="question" data-i18n="issueCatQuestion">❓ คำถาม (Question)</option>
          <option value="improvement" data-i18n="issueCatImprovement">💡 ข้อเสนอแนะ (Improvement)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="issueTitleLabel">หัวข้อ <span class="text-danger">*</span></label>
        <input type="text" id="fb-title" class="form-control"
               data-i18n-placeholder="issueTitlePlaceholder"
               placeholder="อธิบายปัญหาหรือข้อเสนอแนะสั้น ๆ" />
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="issueDescLabel">รายละเอียด</label>
        <textarea id="fb-desc" class="form-control" rows="5"
                  data-i18n-placeholder="issueDescPlaceholder"
                  placeholder="อธิบายรายละเอียดเพิ่มเติม..."
                  style="resize:vertical;"></textarea>
      </div>

      <div class="alert" style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text-muted);display:flex;gap:10px;align-items:flex-start;">
        <span style="font-size:16px;">💡</span>
        <span data-i18n="issueSubmitNote">ระบบจะเปิด GitHub ในแท็บใหม่ กรุณาล็อกอิน GitHub แล้วกด Submit</span>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="window.CVS_Issues.closeFeedback()" data-i18n="cancel">ยกเลิก</button>
      <button class="btn btn-primary" onclick="window.CVS_Issues.submitFeedback()">
        <span data-i18n="issueSubmitGithub">ส่งไปยัง GitHub Issues</span>
      </button>
    </div>
  </div>
</div>
